<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📋</text></svg>">
<!-- Tailwind mode: using CDN + custom glass styles. Removed style.css -->
<title>新增報價單 — 工程單助手 {{ version }}</title>

<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={darkMode:'class'}</script>
<style>
.glass{background:rgba(255,255,255,.55);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.5)}
.dark .glass{background:rgba(30,41,59,.6);border-color:rgba(255,255,255,.08)}
body{background:linear-gradient(135deg,#e0e7f0,#dce3ed,#e8edf5,#d5ddef);background-attachment:fixed}
.dark body{background:linear-gradient(135deg,#0f172a,#1a1f35,#0d1525)}
.btn-del{color:#94a3b8;background:rgba(0,0,0,.04)}.btn-del:hover{background:#ef4444;color:#fff}
input::placeholder,textarea::placeholder{color:transparent;transition:color .2s}
input:focus::placeholder,textarea:focus::placeholder{color:#94a3b8}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important}}
</style>
</head>
<body>
<button class="hidden max-md:block fixed top-2 left-2 z-[51] sb text-white rounded-lg px-3 py-2 text-lg" onclick="document.querySelector('.sidebar').classList.toggle('open')">☰</button>

<!-- Sidebar -->
<div class="sb w-[210px] fixed inset-y-0 left-0 z-50 flex flex-col text-white text-sm overflow-y-auto max-md:-translate-x-full max-md:transition-transform" id="sidebar">
<div class="sidebar-logo">工程單助手<span>{{ version }}</span></div>
<a href="/" class="active"><span class="icon">＋</span>新增報價單</a>
<a href="/projects"><span class="icon">☰</span>工程單列表</a>
<a href="#" onclick="document.getElementById('uploadFile').click()"><span class="icon">↑</span>匯入 Excel</a>
<a href="/minipdf"><span class="icon">⇄</span>MiniPdf 轉換器</a>
<div style="margin-top:auto;padding:8px 14px">
<button class="theme-toggle" onclick="toggleTheme()" title="切換淺色/暗黑模式">🌓</button>
</div>
</div>

<!-- Main -->
<div class="ml-[210px] flex-1 p-7 max-md:ml-0 max-md:p-4 relative z-10">
<h1 class="text-xl font-bold mb-5">新增報價單</h1>

<!-- Upload bar -->
<div class="glass rounded-2xl shadow-sm p-5 mb-4" style="text-align:center;padding:12px 18px">
    <input type="file" id="uploadFile" accept=".xlsx" style="display:none" onchange="uploadExcel()">
    <label for="uploadFile" class="inline-flex items-center gap-1 px-3 py-1.5 border border-slate-200 dark:border-slate-600 text-slate-600 dark:text-slate-300 text-[11px] font-semibold rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700 transition" style="cursor:pointer">匯入 Excel（反向填表）</label>
    <span id="uploadMsg" style="margin-left:10px;font-size:12px;color:var(--text-secondary)"></span>
</div>

<!-- Basic Info -->
<div class="glass rounded-2xl shadow-sm p-5 mb-4">
<div class="text-sm font-bold mb-3 pb-2.5 border-b border-white/20 dark:border-white/[0.08]">基本資料</div>
<div class="grid grid-cols-[repeat(auto-fill,minmax(200px,1fr))] gap-3">
<div class="flex flex-col gap-1"><label>工程名稱</label><input type="text" id="project_name" placeholder="工程名稱…" autocomplete="organization"></div>
<div class="flex flex-col gap-1"><label>客戶姓名</label><input type="text" id="owner_name" placeholder="客戶姓名…" autocomplete="name"></div>
<div class="flex flex-col gap-1"><label>工程地址</label><input type="text" id="address" placeholder="工程地址…" autocomplete="street-address"></div>
<div class="flex flex-col gap-1"><label>裝修公司名 + BR</label><input type="text" id="company_name" placeholder="公司名 + BR…" autocomplete="organization"></div>
<div class="flex flex-col gap-1"><label>報價單號</label><input type="text" id="quotation_no" placeholder="報價單號…"></div>
<div class="flex flex-col gap-1"><label>報價日期</label><input type="date" id="date" autocomplete="bday"></div>
<div class="flex flex-col gap-1"><label>有效期</label><input type="text" id="validity" placeholder="有效期…"></div>
<div class="flex flex-col gap-1"><label>版本</label><input type="text" id="version" placeholder="版本…"></div>
<div class="flex flex-col gap-1"><label>已付訂金 (HKD)</label><input type="number" id="deposit" placeholder="0" value="0" min="0" step="1" autocomplete="off"></div>
</div>
</div>

<!-- Items input -->
<div class="glass rounded-2xl shadow-sm p-5 mb-4">
<div class="text-sm font-bold mb-3 pb-2.5 border-b border-white/20 dark:border-white/[0.08]">工程項目</div>
<div class="grid grid-cols-2 gap-3 mb-2.5 max-md:grid-cols-1">
<div class="flex flex-col gap-1.5">
<label>基本工程 <span class="hint">— {序號}{描述} {價錢}（價錢可省略）</span></label>
<textarea id="basicText" placeholder="1兩間浴室清拆磁磚 1000&#10;2全屋地板清拆 2000&#10;3拆牆身一幅 5000&#10;4油漆全屋起底批灰 700&#10;…"></textarea>
</div>
<div class="flex flex-col gap-1.5">
<label>後加工程 <span class="hint">— 冇後加就留空</span></label>
<textarea id="additionalText" placeholder="1全屋新造水喉 21000&#10;…"></textarea>
</div>
</div>
<button class="btn btn-primary btn-lg btn-cta" onclick="parseItems()" style="display:block;margin:0 auto">解析項目（自動分類）</button>
<div class="text-center text-xs text-slate-400 my-1.5" id="parseCount"></div>

<div class="overflow-x-auto">
<table class="w-full text-xs border-collapse">
<thead><tr>
<th style="width:48px">序號</th><th style="width:72px">階段</th><th style="width:100px">分類</th>
<th style="min-width:220px">項目描述</th><th style="width:55px">數量</th><th style="width:55px">單位</th>
<th style="width:85px">單價(HKD)</th><th style="width:95px">金額(HKD)</th>
<th style="width:140px">備註</th><th style="width:45px"></th>
</tr></thead>
<tbody id="itemsBody">
<tr class="text-center text-slate-400 py-8"><td colspan="10">請喺上方文字框貼入項目，然後點擊「解析項目」</td></tr>
</tbody>
</table>
</div>
<button class="inline-flex items-center gap-1 px-3 py-1.5 border border-slate-200 dark:border-slate-600 text-slate-600 dark:text-slate-300 text-[11px] font-semibold rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700 transition" onclick="addEmptyItem()" style="margin-top:8px">＋ 手動新增項目</button>
<div class="flex justify-end items-center gap-4 mt-3 pt-2.5 border-t border-white/20 dark:border-white/[0.08] text-sm">
<span class="font-semibold text-slate-500 dark:text-slate-400">總計 (HKD)：</span>
<span class="text-[22px] font-bold text-sky-500" id="grandTotal">$0</span>
</div>
</div>

<!-- Payment + Terms -->
<div class="glass rounded-2xl shadow-sm p-5 mb-4">
<div class="text-sm font-bold mb-3 pb-2.5 border-b border-white/20 dark:border-white/[0.08]">付款階段及備註條款</div>
<details>
<summary><label style="cursor:pointer"><input type="checkbox" id="showTerms" style="margin-right:6px">備註條款</label></summary>
<div id="termList"></div>
<button class="inline-flex items-center gap-1 px-3 py-1.5 border border-slate-200 dark:border-slate-600 text-slate-600 dark:text-slate-300 text-[11px] font-semibold rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700 transition" onclick="addTerm()" style="margin-top:6px">＋ 新增條款</button>
</details>
<details style="margin-top:8px">
<summary><label style="cursor:pointer"><input type="checkbox" id="showPayment" style="margin-right:6px">付款階段</label></summary>
<div id="paymentList"></div>
<button class="inline-flex items-center gap-1 px-3 py-1.5 border border-slate-200 dark:border-slate-600 text-slate-600 dark:text-slate-300 text-[11px] font-semibold rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700 transition" onclick="addPayment()" style="margin-top:6px">＋ 新增付款期</button>
</details>
</div>

<!-- Generate -->
<div class="glass rounded-2xl shadow-sm p-5 mb-4" style="text-align:center">
<button class="px-8 py-3.5 bg-sky-500 hover:bg-sky-600 text-white font-bold rounded-xl text-base shadow-lg shadow-sky-500/25 transition-all active:scale-95" onclick="generate('quotation')">生成報價單</button>
<button class="px-8 py-3.5 bg-sky-500 hover:bg-sky-600 text-white font-bold rounded-xl text-base shadow-lg shadow-sky-500/25 transition-all active:scale-95" onclick="generate('invoice')" style="margin-left:8px">生成發票</button>
<div id="msg" ></div>
</div>

<!-- Modal -->
<div class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm z-[999] justify-center items-center overscroll-contain" id="dlg" id="dlg">
<div class="glass rounded-2xl p-9 text-center max-w-[420px] w-[90%] shadow-2xl">
<h3 id="dlgTitle">已生成</h3>
<p id="dlgFile"></p>
<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;justify-content:center">
<a class="px-8 py-3.5 bg-sky-500 hover:bg-sky-600 text-white font-bold rounded-xl text-base shadow-lg shadow-sky-500/25 transition-all active:scale-95" id="dlgLink" href="#" style="flex:1;min-width:160px;text-align:center">下載 Excel</a>
<button class="btn btn-secondary btn-lg" onclick="showMiniPdf()" style="flex:1;min-width:160px">MiniPdf 轉換 PDF</button>
</div>
<button class="inline-flex items-center gap-1.5 px-4 py-2.5 border border-slate-200 dark:border-slate-600 text-slate-700 dark:text-slate-200 font-semibold rounded-xl text-sm hover:bg-slate-100 dark:hover:bg-slate-700 transition" onclick="document.getElementById('dlg').classList.add('hidden');dlg.classList.remove('flex')" style="width:100%;margin-top:8px">關閉</button>
</div>
</div>

</div><!-- /main -->

<script>
// ── Theme ──
(function() {
    const saved = localStorage.getItem('theme');
    if (saved) { document.documentElement.setAttribute('data-theme', saved); return; }
    if (window.matchMedia('(prefers-color-scheme: dark)').matches) document.documentElement.setAttribute('data-theme', 'dark');
    else document.documentElement.setAttribute('data-theme', 'light');
})();
function toggleTheme() {
    const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
}

// ── Init ──
document.getElementById('date').value = new Date().toISOString().split('T')[0];

// Auto-fill from project list
(function() {
    const data = sessionStorage.getItem('loadProject');
    if (data) {
        sessionStorage.removeItem('loadProject');
        try {
            const d = JSON.parse(data);
            const fields = ['project_name','owner_name','address','company_name','quotation_no','date','validity','version','deposit'];
            fields.forEach(f => { const el = document.getElementById(f); if (el && d[f] !== undefined) el.value = d[f] || ''; });
            const basicLines = [], addLines = [];
            (d.items||[]).forEach(it => {
                const line = `${it.description} ${it.unit_price}`;
                if (it.is_additional) addLines.push(line); else basicLines.push(line);
            });
            document.getElementById('basicText').value = basicLines.join('\n');
            document.getElementById('additionalText').value = addLines.join('\n');
            parseItems();
            if (d.payments) { document.getElementById('paymentList').innerHTML = ''; d.payments.forEach(p => addPayment(p)); document.getElementById('showPayment').checked = d.payments.length > 0; }
            if (d.terms) { document.getElementById('termList').innerHTML = ''; d.terms.forEach(t => addTerm(t)); document.getElementById('showTerms').checked = d.terms.length > 0; updateTermNums(); }
        } catch(e) {}
    }
})();

// ── Category rules ──
const CATEGORY_RULES = [
{name:'安裝代工', keywords:['安裝.*人工','代裝','代工','人工安裝','裝工','連裝工','安裝費','安裝人工']},
{name:'清拆工程', keywords:['清拆','清折','清走','拆牆','拆門','拆櫃','拆磚','拆地板','拆卸','拆舊','打拆','垃圾','清場','完工清場','裝修期清場','搭棚','棚架','外牆棚','竹棚','保險費','第三者保險','工程保險','裝修期間保險','保護','保護板','保護地磚','完工清潔','裝修清潔']},
{name:'水電工程', keywords:['水喉','來去水','去水喉','大渠','銅喉','英國喉','暗藏包膠銅喉','電制','燈制','插蘇','蘇位','孖蘇','單蘇','13A','20A','供電','電位','電燈','暗線','明喉','菲士箱','菲箱','電箱','漏電總箱','WR1','60A','100A','煤氣','石油氣','熱水爐','煮食爐','乾衣機','洗衣機','冷氣','抽氣扇','抽油煙機','浴室寶','暖風機','暖通機','LED','石英燈','光管','燈帶','門口燈','走廊燈','壁燈','門鐘','TV蘇','電爐','焗爐']},
{name:'泥水工程', keywords:['鋪磚','舖磚','磁磚','瓷磚','代鋪','代舖','包底料','包低料','地台','英泥沙','湯英泥沙','批盪','盪英泥沙','企缸','磚牆','沙磚','水泥','砌牆','紅磚','間牆','泥水','盪$','地板','無逢地板','無縫地板','膠地板','木地板','複合地板','防水','防漏','滲水','鋁窗','窗花','鋁板','鋁百葉','鋁天花','強化玻璃','中空玻璃','窗框','窗台石','窗枱石','窗台雲石','窗簾','路軌','窗廉','欄河','露台']},
{name:'油漆工程', keywords:['油漆','批灰','油油','起底','起紙','手掃漆','剷底','翻油','ICI','日本漆','乳膠漆','多樂士','立邦','牆紙','牆布','剷牆紙']},
{name:'木工工程', keywords:['木門','趟門','暗門','大門','房門','巴士門','鋼門','門框','門鎖','門較','門吸','裝門','換門','天花','燈槽','燈糟','木天花','長條天花','腳線','腳缐','地腳線','木板','膠板','Formica','夾板','德利板','釘板','床板','包陣位','屏風','廚櫃','厨柜','上下櫃','吊櫃','地櫃','高櫃','組合櫃','衣櫃','衣柜','鞋櫃','書櫃','書台','書枱','寫字台','電視櫃','飾物櫃','儲物櫃','層板架','琴架','床','雙人床','單人床','上下床','地台床','梳妝台','雲石','檯面','枱面','台面','台面石','石面','石英石','Corian','櫃桶','櫃面','星盤','昇盤','雙盤','面盤','臉盤','鏡櫃','面盤櫃','拉籃','層板']},
{name:'雜項', keywords:['代購','代付','代訂','代買','代支','吸咀','浴屏','玻璃浴屏','潔具','馬桶','坐廁','花灑','龍頭','浴缸','面盆','臉盆','洗手盆','廁所','浴室','清潔','搬運','運輸','雜項','雜物']},
];
const ALL_CATEGORIES = CATEGORY_RULES.map(r => r.name);

function autoCategorize(desc) {
    for (const rule of CATEGORY_RULES) {
        for (const kw of rule.keywords) {
            try { if (new RegExp(kw, 'i').test(desc)) return rule.name; }
            catch(e) { if (desc.includes(kw)) return rule.name; }
        }
    }
    return '雜項';
}

// ── Parse items ──
function parseItems() {
    const basicText = document.getElementById('basicText').value.trim();
    const additionalText = document.getElementById('additionalText').value.trim();
    const tbody = document.getElementById('itemsBody'); tbody.innerHTML = '';
    let total = 0;
    if (basicText) { parseBlock(basicText, false).forEach(it => { addRow(it); total++; }); }
    if (additionalText) { parseBlock(additionalText, true).forEach(it => { addRow(it); total++; }); }
    if (total === 0) {
        tbody.innerHTML = '<tr class="text-center text-slate-400 py-8"><td colspan="10">未能解析任何項目，請檢查格式：{序號}{描述} {價錢}</td></tr>';
        document.getElementById('parseCount').textContent = '';
    } else {
        document.getElementById('parseCount').textContent = '已解析 ' + total + ' 個項目，請檢查分類是否正確';
    }
    updateSeq(); calcAll();
}

function parseBlock(text, isAdditional) {
    const items = [], lines = text.split('\n');
    for (const line of lines) {
        const t = line.trim(); if (!t) continue;
        const m = t.match(/^(\d+)[.\s、．]*\s*(.+?)\s+(\d+)\s*$/);
        if (m) { items.push({is_additional:isAdditional, category:autoCategorize(m[2].trim()), description:m[2].trim(), quantity:1, unit:'項', unit_price:parseInt(m[3],10), remark:''}); continue; }
        const lm = t.match(/^(.+?)\s+(\d+)\s*$/);
        if (lm) { const d=lm[1].replace(/^\d+[.\s、．]*\s*/,'').trim(); if(d&&parseInt(lm[2],10)>=0) { items.push({is_additional:isAdditional, category:autoCategorize(d), description:d, quantity:1, unit:'項', unit_price:parseInt(lm[2],10), remark:''}); continue; } }
        const nm = t.match(/^(\d+)[.\s、．]*\s*(.+)$/);
        if (nm) { const d=nm[2].trim(); if(d) { items.push({is_additional:isAdditional, category:autoCategorize(d), description:d, quantity:1, unit:'項', unit_price:0, remark:''}); continue; } }
        if (t.length>1) items.push({is_additional:isAdditional, category:autoCategorize(t), description:t, quantity:1, unit:'項', unit_price:0, remark:''});
    }
    return items;
}

// ── Table rows ──
function addRow(data) {
    const tbody = document.getElementById('itemsBody'); const eh = tbody.querySelector('.empty-hint'); if (eh) eh.remove();
    const tr = document.createElement('tr');
    const isAdd = data.is_additional||false, cat = data.category||'雜項', desc = data.description||'';
    const qty = data.quantity||1, unit = data.unit||'項', price = data.unit_price||0, remark = data.remark||'';
    tr.innerHTML = `<td><span class="seq-num">0</span></td>
<td><select class="px-2.5 py-2 border border-black/10 dark:border-white/10 rounded-lg text-sm bg-white/70 dark:bg-slate-800/70 backdrop-blur-sm focus:border-sky-500 focus:ring-2 focus:ring-sky-500/20 outline-none transition" onchange="updateSeq()"><option value="basic" ${!isAdd?'selected':''}>基本</option><option value="additional" ${isAdd?'selected':''}>後加</option></select></td>
<td><select class="px-2.5 py-2 border border-black/10 dark:border-white/10 rounded-lg text-sm bg-white/70 dark:bg-slate-800/70 backdrop-blur-sm focus:border-sky-500 focus:ring-2 focus:ring-sky-500/20 outline-none transition">${ALL_CATEGORIES.map(c=>`<option value="${c}" ${cat===c?'selected':''}>${c}</option>`).join('')}</select></td>
<td><input type="text" class="px-2.5 py-2 border border-black/10 dark:border-white/10 rounded-lg text-sm bg-white/70 dark:bg-slate-800/70 backdrop-blur-sm focus:border-sky-500 focus:ring-2 focus:ring-sky-500/20 outline-none transition" value="${esc(desc)}" style="text-align:left"></td>
<td><input type="number" class="px-2.5 py-2 border border-black/10 dark:border-white/10 rounded-lg text-sm bg-white/70 dark:bg-slate-800/70 backdrop-blur-sm focus:border-sky-500 focus:ring-2 focus:ring-sky-500/20 outline-none transition" value="${qty}" min="0" step="1" onchange="calcRow(this)" oninput="calcRow(this)"></td>
<td><input type="text" class="px-2.5 py-2 border border-black/10 dark:border-white/10 rounded-lg text-sm bg-white/70 dark:bg-slate-800/70 backdrop-blur-sm focus:border-sky-500 focus:ring-2 focus:ring-sky-500/20 outline-none transition" value="${esc(unit)}"></td>
<td><input type="number" class="px-2.5 py-2 border border-black/10 dark:border-white/10 rounded-lg text-sm bg-white/70 dark:bg-slate-800/70 backdrop-blur-sm focus:border-sky-500 focus:ring-2 focus:ring-sky-500/20 outline-none transition" value="${price}" min="0" step="1" onchange="calcRow(this)" oninput="calcRow(this)"></td>
<td class="col-amount">$0</td>
<td><input type="text" class="px-2.5 py-2 border border-black/10 dark:border-white/10 rounded-lg text-sm bg-white/70 dark:bg-slate-800/70 backdrop-blur-sm focus:border-sky-500 focus:ring-2 focus:ring-sky-500/20 outline-none transition" value="${esc(remark)}" style="text-align:left"></td>
<td><button class="btn-del px-2 py-1 rounded text-[11px] font-semibold transition" onclick="delItem(this)">✕</button></td>`;
    tbody.appendChild(tr);
    const qi = tr.querySelector('.qty-input'); if (qi) calcRow(qi);
}

function addEmptyItem() { addRow({is_additional:false, category:'雜項', description:'', quantity:1, unit:'項', unit_price:0, remark:''}); updateSeq(); document.getElementById('parseCount').textContent = ''; }
function delItem(btn) { const tr = btn.closest('tr'); tr.remove(); updateSeq(); calcAll(); const tb = document.getElementById('itemsBody'); if (tb.children.length===0) { tb.innerHTML='<tr class="text-center text-slate-400 py-8"><td colspan="10">請喺上方文字框貼入項目，然後點擊「解析項目」</td></tr>'; document.getElementById('parseCount').textContent=''; } }
function updateSeq() { document.querySelectorAll('#itemsBody tr:not(.empty-hint)').forEach((tr,i) => { const s = tr.querySelector('.seq-num'); if (s) s.textContent = i+1; }); }
function calcRow(inp) { const tr = inp.closest('tr'); const q = parseFloat(tr.querySelector('.qty-input')?.value)||0; const p = parseFloat(tr.querySelector('.price-input')?.value)||0; const ac = tr.querySelector('.col-amount'); if (ac) ac.textContent = '$'+(q*p).toLocaleString('en-US'); calcAll(); }
function calcAll() { let t=0; document.querySelectorAll('#itemsBody tr:not(.empty-hint)').forEach(tr=>{ const a = parseFloat((tr.querySelector('.col-amount')?.textContent||'$0').replace(/[$,]/g,''))||0; t+=a; }); document.getElementById('grandTotal').textContent = '$'+t.toLocaleString('en-US'); }
function esc(s) { if(!s)return''; return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Payments ──
function addPayment(data={label:'', pct:25, label_pct:'', desc:''}) {
    const div = document.getElementById('paymentList'); const row = document.createElement('div'); row.className = 'pay-row';
    row.innerHTML = `<input value="${esc(data.label)}" placeholder="期數名"><input class="px-2.5 py-2 border border-black/10 dark:border-white/10 rounded-lg text-sm bg-white/70 dark:bg-slate-800/70 backdrop-blur-sm focus:border-sky-500 focus:ring-2 focus:ring-sky-500/20 outline-none transition" type="number" value="${data.pct}" placeholder="%" min="0" max="100">%<input value="${esc(data.label_pct)}" placeholder="比例說明"><input value="${esc(data.desc)}" placeholder="付款條件說明"><button class="btn-del px-2 py-1 rounded text-[11px] font-semibold transition" onclick="this.parentElement.remove()">✕</button>`;
    div.appendChild(row);
}
function addTerm(text='') { const div = document.getElementById('termList'); const row = document.createElement('div'); row.className = 'term-row'; row.innerHTML = `<span style="font-weight:bold;min-width:24px">.</span><input value="${esc(text)}" placeholder="條款內容"><button class="btn-del px-2 py-1 rounded text-[11px] font-semibold transition" onclick="this.parentElement.remove();updateTermNums()">✕</button>`; div.appendChild(row); updateTermNums(); }
function updateTermNums() { document.querySelectorAll('#termList .term-row').forEach((r,i)=>{ r.querySelector('span').textContent=(i+1)+'.'; }); }

// ── Collect & Generate ──
function collectData() {
    const items = [];
    document.querySelectorAll('#itemsBody tr:not(.empty-hint)').forEach(tr=>{
        const desc = tr.querySelector('.desc-input')?.value.trim()||''; if (!desc) return;
        items.push({ is_additional: (tr.querySelector('.stage-select')?.value||'basic')==='additional', category: tr.querySelector('.cat-select')?.value||'雜項', description: desc, quantity: parseFloat(tr.querySelector('.qty-input')?.value)||0, unit: tr.querySelector('.unit-input')?.value.trim()||'項', unit_price: parseFloat(tr.querySelector('.price-input')?.value)||0, remark: tr.querySelector('.remark-input')?.value.trim()||'' });
    });
    const readPayments = () => { const rows = document.querySelectorAll('#paymentList .pay-row'); return Array.from(rows).map(r => { const inputs = r.querySelectorAll('input'); const pct = parseFloat(inputs[1]?.value)||0; return {label:inputs[0]?.value||'', pct:pct/100, label_pct:inputs[2]?.value||`總金額之 ${pct}%`, desc:inputs[3]?.value||''}; }).filter(p => p.label); };
    const readTerms = () => { const inputs = document.querySelectorAll('#termList input'); return Array.from(inputs).map(inp => inp.value).filter(v => v.trim()); };
    return {
        project_name: document.getElementById('project_name').value.trim()||'-', owner_name: document.getElementById('owner_name').value.trim()||'',
        address: document.getElementById('address').value.trim()||'', company_name: document.getElementById('company_name').value.trim()||'',
        quotation_no: document.getElementById('quotation_no').value.trim()||'', date: document.getElementById('date').value||new Date().toISOString().split('T')[0],
        validity: document.getElementById('validity').value.trim()||'', version: document.getElementById('version').value.trim()||'',
        deposit: parseFloat(document.getElementById('deposit').value)||0, items,
        show_payment: document.getElementById('showPayment').checked, payments: readPayments(),
        show_terms: document.getElementById('showTerms').checked, terms: readTerms(),
    };
}

async function generate(type) {
    const data = collectData(); if (data.items.length===0) { showMsg('請至少填寫一個工程項目！','error'); return; }
    const btns = document.querySelectorAll('.btn-primary.btn-lg'); btns.forEach(b=>b.disabled=true);
    showMsg('正在生成中…','');
    try {
        const resp = await fetch('/generate', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({type, data})});
        if (!resp.ok) { const err=await resp.json(); throw new Error(err.error||'生成失敗'); }
        const result = await resp.json();
        if (result.preview_id) {
            const tname = type==='invoice'?'發票':'報價單'; const parts = [];
            if (data.quotation_no) parts.push(data.quotation_no); if (data.address) parts.push(data.address); if (data.owner_name) parts.push(data.owner_name);
            const ds = (data.date||'').replace(/-/g,''); if (ds) parts.push(ds); if (!parts.length) parts.push(ds||'-');
            document.getElementById('dlgTitle').textContent = tname + '已生成';
            document.getElementById('dlgFile').textContent = parts.join('_') + '_' + tname + '.xlsx';
            document.getElementById('dlgLink').href = '/download/' + result.preview_id + '/excel';
            document.getElementById('dlg').classList.remove('hidden');dlg.classList.add('flex'); showMsg('','');
        }
    } catch(err) { showMsg('生成失敗：'+err.message,'error'); }
    finally { btns.forEach(b=>b.disabled=false); }
}
function showMsg(t,c) { const m=document.getElementById('msg'); m.textContent=t; m.className='msg '+c; }
function showMiniPdf() {
    // Auto-download Excel first
    const link = document.getElementById('dlgLink');
    if (link && link.href) {
        const a = document.createElement('a');
        a.href = link.href;
        a.download = '';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }
    // Then navigate to MiniPdf
    setTimeout(function(){ location.href='/minipdf'; }, 500);
}

// ── Upload ──
async function uploadExcel() {
    const file = document.getElementById('uploadFile').files[0]; if (!file) return;
    const um = document.getElementById('uploadMsg'); um.textContent = '解析中…';
    const fd = new FormData(); fd.append('file', file);
    try {
        const resp = await fetch('/upload', {method:'POST', body:fd});
        if (!resp.ok) { const err=await resp.json(); throw new Error(err.error||'失敗'); }
        const data = await resp.json();
        const fields = ['project_name','owner_name','address','company_name','quotation_no','date','validity','version','deposit'];
        fields.forEach(f => { const el = document.getElementById(f); if (el && data[f] !== undefined) el.value = data[f] || ''; });
        const basicLines=[], addLines=[];
        (data.items||[]).forEach(it => { const line=`${it.description} ${it.unit_price}`; if (it.is_additional) addLines.push(line); else basicLines.push(line); });
        document.getElementById('basicText').value = basicLines.join('\n');
        document.getElementById('additionalText').value = addLines.join('\n'); parseItems();
        document.getElementById('paymentList').innerHTML=''; (data.payments||[]).forEach(p=>addPayment(p)); document.getElementById('showPayment').checked=(data.payments||[]).length>0;
        document.getElementById('termList').innerHTML=''; (data.terms||[]).forEach(t=>addTerm(t)); document.getElementById('showTerms').checked=(data.terms||[]).length>0; updateTermNums();
        um.textContent = '匯入成功：' + (data._filename||file.name);
        setTimeout(()=>{um.textContent='';}, 4000);
    } catch(err) { um.textContent = '匯入失敗：'+err.message; }
}
