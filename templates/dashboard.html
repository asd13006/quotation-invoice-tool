<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>&#x25A6;</text></svg>">
<title>Dashboard — 工程單助手 {{ version }}</title>
<link rel="stylesheet" href="/static/dist/output.css?v={{ version }}">
<link rel="stylesheet" href="/static/style.css?v={{ version }}">
<link rel="manifest" href="/manifest.json?v={{ version }}">
<style>
.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--card-bg);border-radius:10px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.stat-card .num{font-size:32px;font-weight:700;color:var(--text-primary);line-height:1.2}
.stat-card .label{font-size:13px;color:var(--text-secondary);margin-top:4px}
.stat-card.green .num{color:#0F9D58}
.stat-card.blue .num{color:#1F4E78}
.stat-card.orange .num{color:#E37400}
.section{margin-bottom:24px}
.section h2{font-size:15px;font-weight:600;color:var(--text-primary);margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--border)}
.cat-bar{display:flex;align-items:center;margin-bottom:8px}
.cat-bar .cat-name{width:90px;font-size:13px;color:var(--text-secondary);flex-shrink:0}
.cat-bar .bar-track{flex:1;height:20px;background:var(--bg);border-radius:4px;overflow:hidden;margin:0 10px}
.cat-bar .bar-fill{height:100%;background:#1F4E78;border-radius:4px;transition:width .3s}
.cat-bar .cat-num{font-size:12px;color:var(--text-secondary);min-width:80px;text-align:right}
.status-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.status-badge{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px}
.status-badge.draft{background:#e2e8f0;color:#475569}
.status-badge.sent{background:#dbeafe;color:#1e40af}
.status-badge.confirmed{background:#d1fae5;color:#065f46}
.status-badge.in_progress{background:#fef3c7;color:#92400e}
.status-badge.completed{background:#d1fae5;color:#065f46}
.status-badge.cancelled{background:#fee2e2;color:#991b1b}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-secondary)}
.empty-state .icon{font-size:48px;margin-bottom:12px}
</style>
</head>
<body>
<button class="menu-toggle" onclick="document.querySelector('.sidebar').classList.toggle('open')">&#x2630;</button>
<div class="sidebar">
<div class="sidebar-logo">工程單助手<span>{{ version }}</span></div>
<a href="/"><span class="icon">&#xFF0B;</span>新增報價單</a>
<a href="/projects"><span class="icon">&#x2630;</span>工程單列表</a>
<a href="/dashboard" class="active"><span class="icon">&#x25A6;</span>Dashboard</a>
<a href="/projects-manage"><span class="icon">&#x25A2;</span>專案管理</a>
<a href="#" onclick="document.getElementById('uploadFile').click()"><span class="icon">&#x21E7;</span>匯入 Excel</a>
<a href="/minipdf"><span class="icon">&#x21C4;</span>MiniPdf</a>
<div style="margin-top:auto;padding:8px 14px">
<button class="theme-toggle" onclick="toggleTheme()" title="切換淺色/暗黑模式">&#x25D1;</button>
</div>
</div>

<div class="main">
<h1 class="page-title">&#x25A6; Dashboard</h1>

<div class="dash-grid" id="statCards"></div>

<div class="section">
<h2>專案狀態分佈</h2>
<div class="status-row" id="statusBadges"></div>
</div>

<div class="section">
<h2>最常用工程分類</h2>
<div id="catBars"></div>
</div>

<div class="section">
<h2>每月營業額（近12個月）</h2>
<div id="revenueList"></div>
</div>

<div class="empty-state" id="emptyState" style="display:none">
<div class="icon">&#x1F4AD;</div>
<p>未有數據 — 生成第一張報價單就會自動記錄</p>
<a href="/" class="btn btn-primary" style="margin-top:12px;display:inline-block">&#xFF0B; 新增報價單</a>
</div>
</div>

<script>
(function(){
var s=localStorage.getItem('theme');
if(s)document.documentElement.setAttribute('data-theme',s);
else if(window.matchMedia('(prefers-color-scheme:dark)').matches)document.documentElement.setAttribute('data-theme','dark');
})();
function toggleTheme(){
var n=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';
document.documentElement.setAttribute('data-theme',n);localStorage.setItem('theme',n);
}

async function load(){
try{
var r=await fetch('/api/dashboard');
if(!r.ok)throw new Error('failed');
var d=await r.json();
if(d.total_projects===0){document.getElementById('emptyState').style.display='block';return}
render(d);
}catch(e){document.getElementById('emptyState').style.display='block'}
}

function render(d){
var cards=[
{num:d.total_projects,label:'總專案數',cls:'blue'},
{num:d.this_month_count,label:'今月新增',cls:'green'},
{num:'$'+d.this_month_total.toLocaleString('en-US'),label:'今月報價總額',cls:'green'},
{num:d.confirmed_count,label:'已確認/施工中',cls:'orange'},
{num:d.completed_count,label:'已完工',cls:'green'},
{num:d.pending_payments,label:'待收款項數',cls:'orange'},
];
var h='';
cards.forEach(function(c){
h+='<div class="stat-card '+c.cls+'"><div class="num">'+c.num+'</div><div class="label">'+c.label+'</div></div>';
});
document.getElementById('statCards').innerHTML=h;

var labels={draft:'草稿',sent:'已發出',confirmed:'已確認',in_progress:'施工中',completed:'已完工',cancelled:'已取消'};
var bh='';
for(var k in d.status_counts){
var v=d.status_counts[k];
if(v===0&&k==='cancelled')continue;
bh+='<span class="status-badge '+k+'">'+labels[k]+' <strong>'+v+'</strong></span>';
}
document.getElementById('statusBadges').innerHTML=bh;

if(d.top_categories.length){
var max=d.top_categories[0].count;
var ch='';
d.top_categories.forEach(function(c){
var w=(c.count/max*100).toFixed(0);
ch+='<div class="cat-bar"><span class="cat-name">'+c.name+'</span><div class="bar-track"><div class="bar-fill" style="width:'+w+'%"></div></div><span class="cat-num">'+c.count+' 項 / $'+c.total.toLocaleString('en-US')+'</span></div>';
});
document.getElementById('catBars').innerHTML=ch;
}

if(d.monthly_revenue.length){
var rh='';
d.monthly_revenue.forEach(function(m){
rh+='<div class="cat-bar"><span class="cat-name">'+m.month+'</span><div class="bar-track"><div class="bar-fill" style="width:'+Math.min(100,m.total/Math.max.apply(null,d.monthly_revenue.map(function(x){return x.total}))*100)+'%"></div></div><span class="cat-num">$'+m.total.toLocaleString('en-US')+'</span></div>';
});
document.getElementById('revenueList').innerHTML=rh;
}
}

load();
</script>
</body>
</html>
