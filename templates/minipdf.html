<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>&#x25A2;</text></svg>">

<title>MiniPdf 轉換器 — 工程單助手 {{ version }}</title>
<style>
.minipdf-wrap { flex:1; display:flex; flex-direction:column; min-height:0; }
.minipdf-wrap iframe { flex:1; border:none; border-radius:var(--radius); background:#fff; }
</style>
<link rel="stylesheet" href="/static/dist/output.css?v={{ version }}">
<link rel="stylesheet" href="/static/style.css?v={{ version }}">
<link rel="stylesheet" href="/static/dist/output.css?v={{ version }}">
</head>
<body>
<button class="menu-toggle" onclick="document.querySelector('.sidebar').classList.toggle('open')">☰</button>

<div class="sidebar">
<div class="sidebar-logo">工程單助手<span>{{ version }}</span></div>
<a href="/"><span class="icon">&#xFF0B;</span>新增報價單</a>
<a href="/projects"><span class="icon">&#x2630;</span>工程單列表</a>
<a href="/dashboard"><span class="icon">&#x25A6;</span>Dashboard</a>
<a href="/projects-manage"><span class="icon">&#x25A2;</span>專案管理</a>
<a href="#" onclick="document.getElementById('uploadFile').click()"><span class="icon">&#x21E7;</span>匯入 Excel</a>
<a href="/minipdf" class="active"><span class="icon">&#x21C4;</span>MiniPdf</a>
<div style="margin-top:auto;padding:8px 14px">
<button class="theme-toggle" onclick="toggleTheme()" title="切換淺色/暗黑模式">&#x25D1;</button>
</div>
</div>

<div class="main">
<h1 class="page-title">MiniPdf 轉換器</h1>
<p style="color:var(--text-secondary);font-size:13px;margin-bottom:14px">上傳 Excel → 完美 PDF 轉換（由 MiniPdf 引擎提供）</p>
<div class="minipdf-wrap">
<iframe src="https://mini-software.github.io/MiniPdf/" style="width:100%;min-height:75vh"></iframe>
</div>
</div>

<script>
(function() {
    const saved = localStorage.getItem('theme');
    if (saved) { document.documentElement.setAttribute('data-theme', saved); return; }
    if (window.matchMedia('(prefers-color-scheme: dark)').matches) document.documentElement.setAttribute('data-theme', 'dark');
    else document.documentElement.setAttribute('data-theme', 'light');
})();
function toggleTheme() {
    const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
}
</script>
</body>
</html>
