<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📋</text></svg>">

<title>MiniPdf 轉換器 — 工程單助手 {{ version }}</title>


<link rel="stylesheet" href="/static/dist/output.css">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={darkMode:"class"}</script>

<style>
.glass{background:rgba(255,255,255,.55);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.5)}
.dark .glass{background:rgba(30,41,59,.6);border-color:rgba(255,255,255,.08)}
body{background:linear-gradient(135deg,#e0e7f0,#dce3ed,#e8edf5,#d5ddef);background-attachment:fixed}
.dark body{background:linear-gradient(135deg,#0f172a,#1a1f35,#0d1525)}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important}}
</style>
</head>
<body>
<button class="hidden max-md:block fixed top-2 left-2 z-[51] sb text-white rounded-lg px-3 py-2 text-lg" onclick="document.querySelector('.sidebar').classList.toggle('open')">☰</button>

<div class="sb w-[210px] fixed inset-y-0 left-0 z-50 flex flex-col text-white text-sm overflow-y-auto max-md:-translate-x-full max-md:transition-transform" id="sidebar">
<div class="px-4 pt-5 pb-4 border-b border-white/10 font-bold text-[15px] tracking-wide">工程單助手<span>{{ version }}</span></div>
<a href="/"><span class="icon">＋</span>新增報價單</a>
<a href="/projects"><span class="icon">☰</span>工程單列表</a>
<a href="/minipdf" class="active"><span class="icon">⇄</span>MiniPdf 轉換器</a>
<div style="margin-top:auto;padding:8px 14px">
<button class="border border-white/15 rounded-full w-9 h-9 flex items-center justify-center text-base hover:bg-white/10 transition" onclick="toggleTheme()" title="切換淺色/暗黑模式">🌓</button>
</div>
</div>

<div class="ml-[210px] flex-1 p-7 max-md:ml-0 max-md:p-4 relative z-10">
<h1 class="text-xl font-bold mb-5">MiniPdf 轉換器</h1>
<p style="color:var(--text-secondary);font-size:13px;margin-bottom:14px">上傳 Excel → 完美 PDF 轉換（由 MiniPdf 引擎提供）</p>
<div class="flex flex-col flex-1 min-h-0">
<iframe src="https://mini-software.github.io/MiniPdf/" style="width:100%;min-height:75vh"></iframe>
</div>
</div>

<script>
(function() {
    const saved = localStorage.getItem('theme');
    if (saved) { document.documentElement.setAttribute('data-theme', saved); return; }
    if (window.matchMedia('(prefers-color-scheme: dark)').matches) document.documentElement.setAttribute('data-theme', 'dark');
    else document.documentElement.setAttribute('data-theme', 'light');
})();
function toggleTheme() {
    const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
}
</script>
</body>
</html>
