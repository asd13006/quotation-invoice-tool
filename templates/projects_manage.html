<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>&#x25A2;</text></svg>">
<title>專案管理 — 工程單助手 {{ version }}</title>
<link rel="stylesheet" href="/static/dist/output.css">
<link rel="stylesheet" href="/static/style.css">
<link rel="manifest" href="/manifest.json">
<style>
.proj-card{background:var(--card-bg);border-radius:10px;padding:20px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.proj-header{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.proj-header h3{font-size:16px;margin:0;color:var(--text-primary)}
.proj-meta{display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--text-secondary);margin-bottom:8px}
.proj-meta span{display:flex;align-items:center;gap:4px}
.status-select{padding:4px 10px;border-radius:14px;font-size:12px;font-weight:600;border:1px solid var(--border);background:var(--bg);color:var(--text-primary);cursor:pointer}
.status-select option{padding:4px}
.pay-table{width:100%;font-size:12px;border-collapse:collapse;margin-top:8px}
.pay-table th{text-align:left;padding:6px 8px;border-bottom:1px solid var(--border);color:var(--text-secondary);font-weight:600}
.pay-table td{padding:6px 8px;border-bottom:1px solid var(--border);color:var(--text-primary)}
.pay-check{cursor:pointer;width:18px;height:18px}
.pay-paid{text-decoration:line-through;color:#0F9D58}
.filter-bar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.filter-btn{padding:6px 16px;border-radius:20px;font-size:13px;border:1px solid var(--border);background:var(--bg);color:var(--text-secondary);cursor:pointer}
.filter-btn.active{background:#1F4E78;color:#fff;border-color:#1F4E78}
.amount{font-weight:600;color:var(--text-primary)}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-secondary)}
</style>
</head>
<body>
<button class="menu-toggle" onclick="document.querySelector('.sidebar').classList.toggle('open')">&#x2630;</button>
<div class="sidebar">
<div class="sidebar-logo">工程單助手<span>{{ version }}</span></div>
<a href="/"><span class="icon">&#xFF0B;</span>新增報價單</a>
<a href="/projects"><span class="icon">&#x2630;</span>工程單列表</a>
<a href="/dashboard"><span class="icon">&#x25A6;</span>Dashboard</a>
<a href="/projects-manage" class="active"><span class="icon">&#x25A2;</span>專案管理</a>
<a href="#" onclick="document.getElementById('uploadFile').click()"><span class="icon">&#x21E7;</span>匯入 Excel</a>
<a href="/minipdf"><span class="icon">&#x21C4;</span>MiniPdf</a>
<div style="margin-top:auto;padding:8px 14px">
<button class="theme-toggle" onclick="toggleTheme()" title="切換淺色/暗黑模式">&#x25D1;</button>
</div>
</div>

<div class="main">
<h1 class="page-title">&#x25A2; 專案管理</h1>

<div class="filter-bar">
<button class="filter-btn active" onclick="filter('')">全部</button>
<button class="filter-btn" onclick="filter('draft')">草稿</button>
<button class="filter-btn" onclick="filter('confirmed')">已確認</button>
<button class="filter-btn" onclick="filter('in_progress')">施工中</button>
<button class="filter-btn" onclick="filter('completed')">已完工</button>
</div>

<div id="projectList"></div>
<div class="empty-state" id="emptyState" style="display:none">
<div class="icon">&#x1F4AD;</div>
<p>未有專案記錄 — 生成第一張報價單就會自動建立</p>
<a href="/" class="btn btn-primary" style="margin-top:12px;display:inline-block">&#xFF0B; 新增報價單</a>
</div>
</div>

<script>
(function(){
var s=localStorage.getItem('theme');
if(s)document.documentElement.setAttribute('data-theme',s);
else if(window.matchMedia('(prefers-color-scheme:dark)').matches)document.documentElement.setAttribute('data-theme','dark');
})();
function toggleTheme(){
var n=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';
document.documentElement.setAttribute('data-theme',n);localStorage.setItem('theme',n);
}

var currentFilter='';
var STATUS_LABELS={draft:'草稿',sent:'已發出',confirmed:'已確認',in_progress:'施工中',completed:'已完工',cancelled:'已取消'};

function filter(s){
currentFilter=s;
document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active')});
event.target.classList.add('active');
load();
}

async function load(){
try{
var url='/api/projects/local';
if(currentFilter)url+='?status='+currentFilter;
var r=await fetch(url);
if(!r.ok)throw new Error('failed');
var projects=await r.json();
if(!projects.length){document.getElementById('emptyState').style.display='block';document.getElementById('projectList').innerHTML='';return}
document.getElementById('emptyState').style.display='none';
render(projects);
}catch(e){document.getElementById('emptyState').style.display='block'}
}

function render(projects){
var h='';
projects.forEach(function(p){
var total=p.total||p.quotation_total||p.invoice_total||0;
var deposit=p.deposit||0;
var status=p.status||'draft';
var created=(p.created_at||'').slice(0,10);
var statusOpts='';
Object.keys(STATUS_LABELS).forEach(function(s){
statusOpts+='<option value="'+s+'" '+(status===s?'selected':'')+'>'+STATUS_LABELS[s]+'</option>';
});
var paymentsHtml='';
var payments=p.payments||[];
var paid=p.payments_paid||[];
if(payments.length){
paymentsHtml='<table class="pay-table"><tr><th>付款期數</th><th>比例</th><th>金額</th><th></th></tr>';
payments.forEach(function(pay,i){
var isPaid=paid[i]||false;
var amt=Math.round(total*pay.pct*100);
paymentsHtml+='<tr><td class="'+(isPaid?'pay-paid':'')+'">'+pay.label+'</td><td>'+Math.round(pay.pct*100)+'%</td><td class="amount">$'+amt.toLocaleString('en-US')+'</td><td><input type="checkbox" class="pay-check" '+(isPaid?'checked':'')+' onchange="togglePayment(\''+p.id+'\','+i+')"></td></tr>';
});
paymentsHtml+='</table>';
}
h+='<div class="proj-card"><div class="proj-header"><h3>'+esc(p.project_name||p.address||'未命名')+'</h3><select class="status-select" onchange="changeStatus(\''+p.id+'\',this.value)">'+statusOpts+'</select></div><div class="proj-meta"><span>&#x1F465; '+esc(p.owner_name||'-')+'</span><span>&#x1F3E0; '+esc(p.address||'-')+'</span><span>&#x1F4C5; '+created+'</span><span class="amount">$'+total.toLocaleString('en-US')+'</span>'+(p.invoice_no?'<span>&#x1F9FE; 發票 '+esc(p.invoice_no)+'</span>':'')+'</div>'+paymentsHtml+'</div>';
});
document.getElementById('projectList').innerHTML=h;
}

async function changeStatus(id,newStatus){
try{
var r=await fetch('/api/projects/local/'+id+'/status',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:newStatus})});
if(!r.ok)throw new Error('failed');
}catch(e){alert('更新失敗：'+e.message);load()}
}

async function togglePayment(projId,idx){
try{
var r=await fetch('/api/projects/local/'+projId+'/payment/'+idx,{method:'POST'});
if(!r.ok)throw new Error('failed');
var p=await r.json();
load();
}catch(e){alert('更新失敗：'+e.message)}
}

function esc(s){if(!s)return'';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

load();
</script>
</body>
</html>
