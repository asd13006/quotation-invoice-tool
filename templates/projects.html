<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📋</text></svg>">
<title>工程單管理 {{ version }}</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Microsoft JhengHei', Arial, sans-serif; background: #f0f2f5; color: #333; display: flex; min-height: 100vh; }
.sidebar { width: 220px; background: #002F5597; color: #fff; padding: 20px 0; position: fixed; top: 0; left: 0; bottom: 0; z-index: 100; display: flex; flex-direction: column; }
.sidebar h2 { font-size: 16px; padding: 0 16px 16px; border-bottom: 1px solid rgba(255,255,255,0.2); margin-bottom: 8px; }
.sidebar a { display: flex; align-items: center; gap: 10px; color: rgba(255,255,255,0.8); text-decoration: none; padding: 10px 16px; font-size: 14px; transition: background 0.15s; }
.sidebar a:hover, .sidebar a.active { background: rgba(255,255,255,0.12); color: #fff; }
.sidebar .ver { margin-top: auto; padding: 16px; font-size: 11px; color: rgba(255,255,255,0.4); }
.main { margin-left: 220px; flex: 1; padding: 20px; min-width: 0; }
.container { max-width: 900px; margin: 0 auto; }
h1 { color: #002F5597; margin-bottom: 8px; font-size: 22px; }
.menu-toggle { display: none; position: fixed; top: 10px; left: 10px; z-index: 101; background: #002F5597; color: #fff; border: none; border-radius: 6px; padding: 8px 12px; font-size: 18px; cursor: pointer; }
@media (max-width: 768px) { .sidebar { transform: translateX(-100%); transition: transform 0.2s; } .sidebar.open { transform: translateX(0); } .main { margin-left: 0; } .menu-toggle { display: block; } body { padding-top: 50px; } }
h1 span { font-size: 14px; color: #888; }
.top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.top-bar a { color: #002F5597; text-decoration: none; font-size: 14px; }
.search { width: 100%; padding: 10px 14px; border: 1px solid #ccc; border-radius: 8px; font-size: 15px; margin-bottom: 14px; font-family: inherit; }
.search:focus { outline: 2px solid #002F5597; outline-offset: 1px; }
.list { background: #fff; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,.08); overflow: hidden; }
.item { display: flex; align-items: center; padding: 14px 18px; border-bottom: 1px solid #eee; cursor: pointer; transition: background .15s; gap: 14px; }
.item:hover { background: #eef2fa; }
.item:last-child { border-bottom: none; }
.item-icon { font-size: 24px; min-width: 40px; text-align: center; }
.item-info { flex: 1; min-width: 0; }
.item-name { font-weight: bold; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item-meta { font-size: 12px; color: #888; margin-top: 3px; }
.item-date { font-size: 12px; color: #aaa; white-space: nowrap; }
.empty { text-align: center; padding: 40px; color: #888; }
.loading { text-align: center; padding: 40px; color: #888; }
@media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #ddd; }
    .list { background: #222244; }
    .item { border-color: #333; }
    .item:hover { background: #2a2a44; }
    .search { background: #2a2a3e; border-color: #444; color: #ddd; }
    h1 { color: #6688cc; }
    .item-meta { color: #aaa; }
}
</style>
</head>
<body>
<button class="menu-toggle" onclick="document.querySelector('.sidebar').classList.toggle('open')">☰</button>
<div class="sidebar">
<h2>工程單助手</h2>
<a href="/">📝 新增報價單</a>
<a href="/projects" class="active">📂 工程單列表</a>
<div class="ver">{{ version }}</div>
</div>
<div class="main">
<div class="container">
<div class="top-bar">
<h1>工程單管理 <span>{{ version }}</span></h1>
<a href="/">＋ 新增工程單</a>
</div>
<input class="search" type="text" placeholder="搜尋工程單…" oninput="filterList()" id="searchInput">
<div class="list" id="projectList">
{% if projects %}
{% for p in projects %}
<div class="item" onclick="loadProject('{{ p.id }}')" data-search="{{ p.name }}">
<div class="item-icon">📄</div>
<div class="item-info">
<div class="item-name">{{ p.name }}</div>
<div class="item-meta">{{ p.size_kb }}KB</div>
</div>
<div class="item-date">{{ p.date }}</div>
</div>
{% endfor %}
{% else %}
<div class="empty">未找到工程單。請確保已分享 Google Drive folder 給 Service Account。</div>
{% endif %}
</div>
</div>

<script>
function filterList() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    document.querySelectorAll('.item').forEach(el => {
        el.style.display = el.dataset.search.toLowerCase().includes(q) ? '' : 'none';
    });
}

async function loadProject(fileId) {
    if (!confirm('載入呢張工程單到表單？')) return;
    try {
        const resp = await fetch('/api/projects/' + fileId);
        if (!resp.ok) throw new Error('載入失敗');
        const data = await resp.json();
        // Store in sessionStorage for the main page to pick up
        sessionStorage.setItem('loadProject', JSON.stringify(data));
        window.location.href = '/?load=' + fileId;
    } catch(e) {
        alert('載入失敗：' + e.message);
    }
}
</script>
</div></div>
</body>
</html>
